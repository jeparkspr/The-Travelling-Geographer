services:
  db:
    image: postgis/postgis:16-3.4
    container_name: tg-db
    environment:
      POSTGRES_DB: travelling_geographer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travelling_geographer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: travelling-geographer-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_TRACESTRACK_KEY: ${TRACESTRACK_KEY:-}
    container_name: tg-app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/travelling_geographer
      MEDIA_DIR: /app/media
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-CHANGE-ME-in-production}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tg-tailscale
    hostname: ${TS_HOSTNAME:-travel}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?Set TS_AUTHKEY in .env (generate at https://login.tailscale.com/admin/settings/keys)}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_USERSPACE: true
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./tailscale:/config:ro
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - tailscale

volumes:
  db_data:
  media_data:
  tailscale_state:
