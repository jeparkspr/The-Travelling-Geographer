services:
  db:
    image: postgis/postgis:16-3.4
    container_name: tg-db
    environment:
      POSTGRES_DB: travelling_geographer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travelling_geographer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: travelling-geographer-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_TRACESTRACK_KEY: ${TRACESTRACK_KEY:-}
    container_name: tg-app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/travelling_geographer
      MEDIA_DIR: /app/media
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-CHANGE-ME-in-production}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  media_data:
